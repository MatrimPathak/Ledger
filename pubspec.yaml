name: ledger
description: A premium personal finance tracker.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Charts
  fl_chart: ^0.69.0

  # SMS & Notifications
  another_telephony: ^0.2.1
  flutter_local_notifications: ^17.2.2

  # HTTP for Claude API
  http: ^1.2.2

  # Persistence
  shared_preferences: ^2.3.2

  # UI utilities
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1

  cupertino_icons: ^1.0.8

  # Environment variables
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  fake_cloud_firestore: ^3.1.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
